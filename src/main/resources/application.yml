spring:
  application:
    name: finvibe-websocket-listener
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: local

server:
  port: ${LISTENER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

jwt:
  secret: ${JWT_SECRET:testsecret12312312313123123123testsecret12312312313123123123}
  issuer: ${JWT_ISSUER:finvibe-user}

listener:
  websocket:
    allowed-origins: ${WS_ALLOWED_ORIGINS:*}
    auth-timeout-ms: ${WS_AUTH_TIMEOUT_MS:30000}
    heartbeat-interval-ms: ${WS_HEARTBEAT_INTERVAL_MS:20000}
    pong-timeout-ms: ${WS_PONG_TIMEOUT_MS:45000}
    max-missed-pongs: ${WS_MAX_MISSED_PONGS:4}
    renew-interval-ms: ${WS_RENEW_INTERVAL_MS:120000}
    slow-consumer-grace-ms: ${WS_SLOW_CONSUMER_GRACE_MS:10000}
    event-dispatch-parallelism: ${WS_EVENT_DISPATCH_PARALLELISM:4}
    event-dispatch-queue-capacity: ${WS_EVENT_DISPATCH_QUEUE_CAPACITY:512}
    fanout-chunk-size: ${WS_FANOUT_CHUNK_SIZE:256}
    fanout-chunk-parallelism: ${WS_FANOUT_CHUNK_PARALLELISM:4}
    fanout-chunk-queue-capacity: ${WS_FANOUT_CHUNK_QUEUE_CAPACITY:1024}
    send-time-limit-ms: ${WS_SEND_TIME_LIMIT_MS:10000}
    send-buffer-size-bytes: ${WS_SEND_BUFFER_SIZE_BYTES:262144}
    send-overflow-strategy: ${WS_SEND_OVERFLOW_STRATEGY:DROP}
    session-queue-capacity: ${WS_SESSION_QUEUE_CAPACITY:2048}
  redis:
    topic:
      current-price-updated: ${WS_PRICE_TOPIC:market:price-updated}
