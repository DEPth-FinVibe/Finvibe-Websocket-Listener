name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ vars.LISTENER_IMAGE_NAME || format('{0}/finvibe-websocket-listener', secrets.DOCKERHUB_USERNAME) }}
  LEGACY_CONTAINER_NAME: ${{ vars.LISTENER_CONTAINER_NAME || 'finvibe-websocket-listener' }}
  LOG_DIR_HOST: ${{ vars.LISTENER_LOG_DIR_HOST || '/var/log/finvibe-websocket-listener' }}
  PRIMARY_DOCKER_NETWORK: ${{ vars.PRIMARY_DOCKER_NETWORK || 'infra_bridge' }}
  SECONDARY_DOCKER_NETWORK: ${{ vars.SECONDARY_DOCKER_NETWORK || 'monitoring_net' }}
  INTERNAL_LB_PORT: ${{ vars.LISTENER_INTERNAL_LB_PORT || '18090' }}
  INTERNAL_LB_NETWORK: ${{ vars.INTERNAL_LB_NETWORK || 'finvibe_ws_lb' }}
  LISTENER_REPLICAS: ${{ vars.LISTENER_REPLICAS || '2' }}
  LISTENER_JAVA_TOOL_OPTIONS: ${{ vars.LISTENER_JAVA_TOOL_OPTIONS || '-Xms512m -Xmx2g -XX:+UseG1GC' }}
  LISTENER_MEMORY_LIMIT: ${{ vars.LISTENER_MEMORY_LIMIT || '2560m' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Upload compose manifest
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: |
            deploy/docker-compose.yml
            deploy/nginx.conf
          target: ~/finvibe-websocket-listener
          strip_components: 1

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          LEGACY_CONTAINER_NAME: ${{ env.LEGACY_CONTAINER_NAME }}
          LOG_DIR_HOST: ${{ env.LOG_DIR_HOST }}
          PRIMARY_DOCKER_NETWORK: ${{ env.PRIMARY_DOCKER_NETWORK }}
          SECONDARY_DOCKER_NETWORK: ${{ env.SECONDARY_DOCKER_NETWORK }}
          INTERNAL_LB_PORT: ${{ env.INTERNAL_LB_PORT }}
          INTERNAL_LB_NETWORK: ${{ env.INTERNAL_LB_NETWORK }}
          LISTENER_REPLICAS: ${{ env.LISTENER_REPLICAS }}
          LISTENER_JAVA_TOOL_OPTIONS: ${{ env.LISTENER_JAVA_TOOL_OPTIONS }}
          LISTENER_MEMORY_LIMIT: ${{ env.LISTENER_MEMORY_LIMIT }}
          IMAGE_TAG: ${{ github.sha }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          WS_ALLOWED_ORIGINS: ${{ vars.WS_ALLOWED_ORIGINS || '*' }}
          WS_AUTH_TIMEOUT_MS: ${{ vars.WS_AUTH_TIMEOUT_MS || '10000' }}
          WS_HEARTBEAT_INTERVAL_MS: ${{ vars.WS_HEARTBEAT_INTERVAL_MS || '15000' }}
          WS_PONG_TIMEOUT_MS: ${{ vars.WS_PONG_TIMEOUT_MS || '15000' }}
          WS_MAX_MISSED_PONGS: ${{ vars.WS_MAX_MISSED_PONGS || '2' }}
          WS_RENEW_INTERVAL_MS: ${{ vars.WS_RENEW_INTERVAL_MS || '60000' }}
          WS_PRICE_TOPIC: ${{ vars.WS_PRICE_TOPIC || 'market:price-updated' }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_NAME,LEGACY_CONTAINER_NAME,LOG_DIR_HOST,PRIMARY_DOCKER_NETWORK,SECONDARY_DOCKER_NETWORK,INTERNAL_LB_PORT,INTERNAL_LB_NETWORK,LISTENER_REPLICAS,LISTENER_JAVA_TOOL_OPTIONS,LISTENER_MEMORY_LIMIT,IMAGE_TAG,REDIS_HOST,REDIS_PORT,REDIS_PASSWORD,JWT_SECRET,JWT_ISSUER,WS_ALLOWED_ORIGINS,WS_AUTH_TIMEOUT_MS,WS_HEARTBEAT_INTERVAL_MS,WS_PONG_TIMEOUT_MS,WS_MAX_MISSED_PONGS,WS_RENEW_INTERVAL_MS,WS_PRICE_TOPIC
          script: |
            bash -lc '
            set -eu

            required_vars="REDIS_HOST REDIS_PORT JWT_SECRET JWT_ISSUER"
            for var_name in ${required_vars}; do
              eval "var_value=\${${var_name}:-}"
              if [ -z "${var_value}" ]; then
                echo "Required deployment variable is missing: ${var_name}"
                exit 1
              fi
            done

            DEPLOY_DIR="${HOME}/finvibe-websocket-listener"
            COMPOSE_FILE="${DEPLOY_DIR}/docker-compose.yml"

            mkdir -p "${LOG_DIR_HOST}"
            mkdir -p "${DEPLOY_DIR}"

            if [ ! -f "${COMPOSE_FILE}" ]; then
              echo "Compose manifest not found: ${COMPOSE_FILE}"
              exit 1
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker command not found"
              exit 1
            fi

            if ! docker compose version >/dev/null 2>&1; then
              echo "docker compose plugin is not available"
              exit 1
            fi

            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

            docker network inspect "${PRIMARY_DOCKER_NETWORK}" >/dev/null 2>&1 || {
              echo "Primary docker network not found: ${PRIMARY_DOCKER_NETWORK}"
              exit 1
            }

            docker network inspect "${SECONDARY_DOCKER_NETWORK}" >/dev/null 2>&1 || {
              echo "Secondary docker network not found: ${SECONDARY_DOCKER_NETWORK}"
              exit 1
            }

            if docker ps -a --format "{{.Names}}" | grep -Eq "^${LEGACY_CONTAINER_NAME}$"; then
              docker rm -f "${LEGACY_CONTAINER_NAME}"
            fi

            docker compose -f "${COMPOSE_FILE}" pull
            docker compose -f "${COMPOSE_FILE}" up -d --force-recreate nginx
            docker compose -f "${COMPOSE_FILE}" up -d --remove-orphans --scale listener="${LISTENER_REPLICAS}"

            for i in $(seq 1 60); do
              if ! docker compose -f "${COMPOSE_FILE}" ps --services --filter "status=running" | grep -Eq "^nginx$"; then
                echo "Nginx is not running"
                docker compose -f "${COMPOSE_FILE}" logs --tail=200 nginx listener || true
                exit 1
              fi

              listener_ids="$(docker compose -f "${COMPOSE_FILE}" ps -q listener)"
              running_listener_count=0
              if [ -n "${listener_ids}" ]; then
                running_listener_count="$(printf "%s\n" "${listener_ids}" | awk "NF" | wc -l | tr -d " ")"
              fi

              if [ "${running_listener_count}" -lt "${LISTENER_REPLICAS}" ]; then
                echo "Waiting for listener replicas (${running_listener_count}/${LISTENER_REPLICAS})"
                sleep 5
                continue
              fi

              healthy_listener_count=0
              unhealthy_detected=0
              for listener_id in ${listener_ids}; do
                health_status="$(docker inspect --format "{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}" "${listener_id}")"
                if [ "${health_status}" = "healthy" ]; then
                  healthy_listener_count=$((healthy_listener_count + 1))
                  continue
                fi
                if [ "${health_status}" = "unhealthy" ] || [ "${health_status}" = "none" ]; then
                  unhealthy_detected=1
                fi
              done

              if [ "${unhealthy_detected}" -eq 1 ]; then
                echo "Detected unhealthy listener container"
                docker compose -f "${COMPOSE_FILE}" ps || true
                docker compose -f "${COMPOSE_FILE}" logs --tail=200 listener || true
                exit 1
              fi

              if [ "${healthy_listener_count}" -lt "${LISTENER_REPLICAS}" ]; then
                echo "Waiting for healthy listeners (${healthy_listener_count}/${LISTENER_REPLICAS})"
                sleep 5
                continue
              fi

              if curl --silent --fail "http://localhost:${INTERNAL_LB_PORT}/actuator/health" >/dev/null; then
                echo "Deployment healthy (listeners + internal LB route)"
                exit 0
              fi

              echo "Deployment healthy (listeners only). Internal LB health endpoint is not ready yet."
              exit 0
            done

            echo "Health check failed. Compose state:"
            docker compose -f "${COMPOSE_FILE}" ps || true
            echo "Compose logs:"
            docker compose -f "${COMPOSE_FILE}" logs --tail=300 nginx listener || true
            exit 1
            '
